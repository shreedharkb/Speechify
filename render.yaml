services:
  # ----------------------------------------
  # 1. SBERT ML Microservice (Python / Flask)
  # ----------------------------------------
  - type: web
    name: speechify-sbert
    env: docker
    rootDir: sbert-service
    plan: starter # ML models need memory
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 5002

  # ----------------------------------------
  # 2. Whisper ML Microservice (Python / FastAPI)
  # ----------------------------------------
  - type: web
    name: speechify-whisper
    env: docker
    rootDir: whisper-service
    plan: starter # Audio processing needs memory
    envVars:
      - key: PORT
        value: 5000

  # ----------------------------------------
  # 3. Node.js Backend API
  # ----------------------------------------
  - type: web
    name: speechify-api
    env: node
    rootDir: Backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: speechify-db
          property: connectionString
      - key: REDIS_URL
        sync: false # Render will prompt you to enter your Redis URL (e.g., from Upstash or Render Redis)
      - key: JWT_SECRET
        generateValue: true
      # Internal Render networking for synchronous, zero-latency connections
      - key: SBERT_SERVICE_URL
        value: http://speechify-sbert:5002
      - key: WHISPER_SERVICE_URL
        value: http://speechify-whisper:5000
      - key: FRONTEND_URL
        sync: false # Set this to your Vercel URL once deployed

# ----------------------------------------
# Managed PostgreSQL Database
# ----------------------------------------
databases:
  - name: speechify-db
    databaseName: quiz_app
    user: quiz_admin
    plan: free
